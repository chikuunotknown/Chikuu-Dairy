<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Address | SAM Dairy</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="address-page">
    <nav class="navbar" style="position: fixed; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);">
        <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">SAM Dairy</a></div>
    </nav>

    <div class="address-container">
        <div class="address-card">
            <div class="address-header">
                <i class="fa-solid fa-location-dot location-icon"></i>
                <h2>Where should we deliver?</h2>
                <p>Enter your details to ensure morning delivery before 7 AM.</p>
            </div>
            <form id="address-form" class="address-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" placeholder="+91 XXXXX XXXXX" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Flat / House No.</label>
                        <input type="text" placeholder="e.g. 402, Block A" required>
                    </div>
                    <div class="form-group">
                        <label>Pincode</label>
                        <input type="text" id="pincode" placeholder="e.g. 110001" required>
                        <div id="pincode-error" style="color: #E53E3E; font-size: 0.85rem; margin-top: 0.5rem; display: none;"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Area / Sector</label>
                    <input type="text" placeholder="e.g. Vasant Kunj" required>
                </div>
                <button type="submit" class="cta-btn primary full-width form-submit-btn">Save Address & Shop Milk <i class="fa-solid fa-arrow-right"></i></button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('address-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const pincodeInput = document.getElementById('pincode').value.trim();
            const errorMsg = document.getElementById('pincode-error');
            
            // Validate pincode for Delhi NCR
            let isValid = false;
            
            // Explicitly mentioned pincodes + Delhi (11xxxx), Haryana NCR (12xxxx), UP NCR (201xxx)
            if (['110090', '110091', '110092'].includes(pincodeInput)) {
                isValid = true;
            } else if (
                (pincodeInput.startsWith('11') && pincodeInput.length === 6) || 
                (pincodeInput.startsWith('12') && pincodeInput.length === 6) || 
                (pincodeInput.startsWith('201') && pincodeInput.length === 6)
            ) {
                isValid = true;
            }

            if (isValid) {
                errorMsg.style.display = 'none';
                // Proceed to shopping
                window.location.href = 'shopping.html';
            } else {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Sorry, we currently do not deliver to this pincode. We only serve Delhi NCR region (110090, 110091, 110092, etc).";
                // Add a small shake animation to the input
                const pincodeField = document.getElementById('pincode');
                pincodeField.style.borderColor = '#E53E3E';
                setTimeout(() => { pincodeField.style.borderColor = ''; }, 2000);
            }
        });
    </script>
</body>
</html>
